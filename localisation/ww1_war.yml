### ПОВІДОМЛЕННЯ ###
 national_protection_war_end_message: "Війна на захист республіки завершується без повної перемоги жодної зі сторін. Хоча повного краху вдалося уникнути, на Китай знову чекає період розколу та міжусобиць." # (@VZ)
 national_protection_war_end_alt_message: "Захисники республіки здобули перемогу. Від Юньнаню до Хебею високо підняні прапори тих, хто прагне зберегти республіку. Фальшивий імператор усунутий, амбітні мілітаристи зникли, а засліплені фракційністю тихо замовкли. Майорить лише прапор порятунку китайського народу." # (@VZ)
 zhili_anhui_war_end_message: "Монополії на владу Дуань Ціжуя та Аньхойської кліки настав кінець. Поки лідери Чжилі та Фентяню протистоять один одному в Пекіні, сперечаючись про поділ режиму, спільна мета повалення Аньхою зникла, залишивши лише боротьбу за владу." # (@VZ)
 first_zhili_fengtian_war_end_message: "Перші зіткнення між Чжилі та Фентянем завершилися рішучою перемогою Чжилі. Фентянь відступає назад до своєї бази та шукає примирення. Чжилі наразі забезпечила контроль над більшістю ключових регіонів Китаю." # (@VZ)
 yung_feng_incident_message: "Переворот у Гуанчжоу повністю зірвав Північний похід Гоміндану, залишивши партію на ще більш складному й тернистому шляху." # (@VZ)
 second_zhili_fengtian_war_end_messsage: "Гегемонію Чжилі розбито вщент. Цао Куня повалено, а У Пейфу ледве втік до своєї бази. І в порожнечі, що утворилася після цього краху, Фентянь прагне одноосібно правити Китаєм." # (@VZ)
 anti_chiang_war_end_message: "Незліченні мілітаристи повстали проти людини, яка зосередила у своїх руках усю владу, але зрештою вся влада так і залишилася у Чан Кайші. Проте сам він бачить лише справжнє обличчя Китаю — понівечене шрамами та руйнуваннями." # (@VZ)
 anti_chiang_war_end_alt_message: "Незліченні мілітаристи повстали проти людини, яка зосередила у своїх руках усю владу, і тепер вона перейшла до Янь Сішаня, який прораховує політичні течії тихіше й точніше за будького іншого. Проте сам він бачить лише справжнє обличчя Китаю — понівечене шрамами та руйнуваннями." # (@VZ)
 tanggu_truce_message: "Внутрішні чвари та безпорадність Китаю призвели до японського вторгнення, падіння Маньчжурії та найбільшої зовнішньої загрози в історії. Але з Китаєм ще не покінчено. На південь від Великого китайського муру центральні рівнини народу Хуася знову пробудять свій величезний потенціал і рушать вперед як армія добровольців, повертаючи свою славу. Якщо, звісно, дракону не відрубають голову ще до цього." # (@VZ)
 yunnan_kmt_message: "Коли Тан Цзіяо втратив владу в Юньнані, Юньнаньська кліка пішла на союз із Гомінданом." # (@VZ)
 anti_fengtian_war_zhili_message: "Наче старий лис, Нефритовий маршал шукає можливості для реваншу. Чжилійська армія знову піднімається, сповнена рішучості покарати того, хто завдав їй удару в спину." # (@VZ)
 guangxi_kmt_message: "Коли Лу Жунтін втратив владу в Гуансі, Гуансійська кліка пішла на союз із Гомінданом." # (@VZ)
 northern_expedition_end_message: "Ясне сонце освітлює землю Китаю, наче палюче червоне полум'я. До фінальної глави Китайської республіканської революції залишилося зовсім небагато. Проте Китай досі понівечений мілітаризмом, фракційністю та війною. І, можливо, чергова потужна течія загрожує розірвати країну на шматки." # (@VZ)
 anti_fengtian_war_fujian_message: "Невблаганна армія Фентяню на мить зупиняється. Регіон Цзяннань знову обирає інший шлях, відмінний від Пекіна. І людина, яка йде цим шляхом — Усміхнений тигр." # (@VZ)
 khabarovsk_protocol_message: "Авантюризм Фентяню потонув у червоному припливі. Дізнавшись про своє справжнє становище, молодий лідер буде вбитий горем і може навіть втратити здатність тверезо мислити. Але що важливіше, Червона армія довела свою силу не лише у снігах та тайзі Росії, а й на рівнинах Маньчжурії." # (@VZ)
 khabarovsk_protocol_alt_message: "Молодий лідер Фентяню тепер має нову мету: подібно до скелі, що лишається в піску навіть під ударами червоних хвиль, Китай готовий протистояти червоному імперіалізму." # (@VZ)
 long_march_message: "Китайські соціалісти, долаючи неймовірні труднощі та опір, знаходять притулок у горах Шеньсі. Але якою ціною? Чи дійсно вони знайшли ту Ханаанську землю, яку їм обіцяли?" # (@VZ)
