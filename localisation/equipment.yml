 anti_air_equipment_2: "Поліпшена зенітна артилерія"
 anti_air_equipment_2_desc:0 "Зенітні гармати з довшими патронами та стволами, здатні вражати літаки, що летять на великій висоті." # (@!)
 anti_air_equipment_3: "Удосконалена зенітна артилерія"
 anti_air_equipment_3_desc:1 "Удосконалена мобільна зенітна гармата з більшою дальністю та вогневою потужністю, здатна протистояти навіть найшвидшим і найвищим ворожим літакам." # (@!)
 rocket_artillery_equipment_2: "Удосконалені міномети"
 rocket_artillery_equipment_2_desc: "Удосконалені міномети."
 anti_tank_equipment_2: "Поліпшена протитанкова артилерія"
 anti_tank_equipment_2_desc:0 "Зброя більшого калібру для боротьби з важчими танками з похилим бронюванням." # (@!)
 anti_tank_equipment_3: "Удосконалена протитанкова артилерія"
 anti_tank_equipment_3_desc:0 "Поєднуючи різні види новітніх технологій боєприпасів із гарматами з вищою початковою швидкістю кулі, ці протитанкові гармати готові до будь-яких нових типів броні, які можуть розробити наші вороги." # (@!)
 train_equipment: "Поїзд"
 train_equipment_desc:0 "Потяги транспортують товари з столиці постачання до центрів постачання, з'єднаних залізницею." # (@!)
 train_equipment_1: "Цивільний поїзд"
 train_equipment_1_desc:0 "Цей локомотив, перейнятий військовими від цивільних вантажних перевезень, добре підходить для перевезення великих обсягів вантажів на великі відстані. Однак його цивільна конструкція робить його вразливим." # (@!)
 train_equipment_2: "Військовий спрощений поїзд"
 train_equipment_2_desc:0 "Спрощена конструкція, в якій для здешевлення виробництва відмовлено від багатьох функцій, що зазвичай є у звичайних вантажних поїздах. Він так само вразливий, як і звичайний поїзд, але його легше замінити." # (@!)
 train_equipment_3: "Бронепоїзд"
 train_equipment_3_desc:0 "Локомотив, обшитий важкою бронею, щоб зробити його менш вразливим до атак ворога. Він може перевозити стільки ж вантажу, як і будь-яка інша конструкція, але його виробництво коштує дорожче." # (@!)
 railway_gun_equipment: "Залізнична артилерія"
 railway_gun_equipment_desc:0 "Важка гармата, встановлена на залізничному вагоні для транспортування." # (@!)
 railway_gun_desc:0 "Залізниці дають можливість переміщати важкі гармати вглиб країни з розумною швидкістю, що дозволяє нам обстрілювати позиції ворога на великій відстані і з хорошим ефектом." # (@!)
 railway_gun_equipment_1: "Залізнична гармата"

 armored_support_vehicle: "Броньована машина забезпечення" # vnl.
 armored_support_vehicle_desc: "Ці багатоцільові машини забезпечують необхідну підтримку на полі бою та мобільність під броньованим захистом."
