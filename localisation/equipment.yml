 motorized_equipment_1: "Вантажівка воєнного часу"
 motorized_equipment_1_desc:1 "Під час Великої війни армії почали використовувати звичайні цивільні вантажівки для транспортування припасів та обладнання. Вони стали невід'ємною частиною більшості армій." # (@!)
