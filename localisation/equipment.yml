 #jet_engines_desc:0 "A breakthrough in propulsion technology, the Jet Engine will enable the development of an entirely new generation of aircraft."
 convoy_1: "Конвой"
 armored_car_equipment: "Бронемашина"
 armored_car_equipment_desc: "Легкі броньовані колісні машини. Зазвичай використовуються для розвідки та придушення опору, але можуть бути оснащені важчим озброєнням." # (@) — vnl.
