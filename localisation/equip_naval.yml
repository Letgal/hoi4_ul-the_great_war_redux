 ## Франція
  FRA_submarine_1:0 "Тип «Плювіоз»"
  FRA_destroyer_2:0 "Тип «Вольтіжер»"
  FRA_light_cruiser_1:0 "Тип «Жюр'єн де ла Грав'єр»"
  FRA_armored_cruiser_1:0 "Тип «Едгар Кіне»"
  FRA_battleship_0:0 "Тип «Репюблік»"
  FRA_battleship_0_desc:0 "Ескадрені броненосці типу «Репюблік», завершені між 1906 та 1907 роками, були визначними французькими пре-дредноутами. Вони мали головний калібр із чотирьох 30,5-см (12-дюймових) гармат та значний допоміжний калібр із вісімнадцяти 16,4-см (6,5-дюймових) гармат. Хоча вони й були добре захищені для свого часу, їхнє змішане озброєння миттєво зробило їх застарілими після спуску на воду HMS Dreadnought."
  FRA_battleship_1:0 "Тип «Дантон»"
  FRA_battleship_2:0 "Тип «Курбе»"
  FRA_battleship_2_desc:0 "Перший лінійний корабель-дредноут, побудований у Франції. Корабель ніс дванадцять 305-мм головних гармат і потужні допоміжні гармати. Його борти були посилені великими броньованими зонами. Серед його недоліків був слабкий протиторпедний захист."
  FRA_battleship_3:0 "Тип «Бретань»"
  FRA_battleship_3_desc:0 "Серія французьких лінійних кораблів, побудованих у відповідь на появу британських «супердредноутів». Ці кораблі були розроблені безпосередньо на основі кораблів попереднього типу, але несли 340-мм гармати, розташовані за раціональнішою схемою."
  FRA_battleship_4:0 "Тип «Норманді»"
  FRA_battleship_4_desc:0 "Перший проєкт французького лінійного корабля, у якому гармати головного калібру розміщувалися у трьох чотиригарматних баштах. Будівництво таких башт було зумовлене прагненням досягти максимальної потужності бортового залпу за обмежених розмірів корабля."
  FRA_SH_battleship_1:0 "Тип «Ліон»" # fictional
  FRA_SH_battleship_2:0 "Тип «Дюнкерк»" # fictional

 ## Сполучені Штати
  USA_battleship_0:0 "Тип «Вірджинія»"
  USA_battleship_0_desc:0 "Ескадрені броненосці типу «Вірджинія», введені в експлуатацію між 1906 та 1907 роками, становили велику серію пре-дредноутів Військово-морських сил США. Вони мали незвичне «двоярусне» розташування головного калібру: чотири 30,5-см (12-дюймові) гармати у двох двогарматних баштах та вісім 20,3-см (8-дюймових) гармат, встановлених поверх основних башт та в бортових баштах. Цей підхід зі змішаним калібром став яскравим прикладом конструкторської філософії пре-дредноутів, від якої незабаром відмовилися."
  USA_battleship_1:0 "Тип «Саут Керолайна»"
  USA_battleship_1_desc:0 "Перший дредноут у ВМС США. Через обмежені розміри корабель мав відносно слабке озброєння та низьку швидкість. Лінійні кораблі цього типу першими отримали лінійно-піднесене розташування башт. Це означало, що корабель міг вести повний бортовий залп з усіх гармат головного калібру."
  USA_battleship_2:0 "Тип «Вайомінг»"
  USA_battleship_2_desc:0 "Типовий лінійний корабель першого покоління у ВМС США. Корабель був дуже добре збалансованим для свого часу. На відміну від своїх попередників, він був озброєний численними гарматами головного калібру з більшою дальністю стрільби. Турбінна силова установка дозволяла розвивати цілком пристойну для дредноута швидкість."
  USA_battleship_3:0 "Тип «Нью-Йорк»"
  USA_battleship_3_desc:0 "Створений на основі типу «Вайомінг». На відміну від свого попередника, мав посилене бронювання та гармати головного калібру більшого калібру. Після модернізації отримав досить непогану ППО та вдосконалений протиторпедний захист."
  USA_battleship_4:0 "Тип «Колорадо»"
  USA_battleship_4_desc:0 "Він став завершальним етапом у розвитку традиційних лінійних кораблів, які мали дуже важкий броньовий захист життєво важливих частин корабля. Ключовими відмінностями від попередників були 406-мм головні гармати та новітня система протиторпедного захисту. За швидкістю він поступався іншим лінкорам свого часу."

 ## Італія
  ITA_battleship_0:0 "Тип «Реджина Маргерита»"
  ITA_battleship_0_desc:0 "Ескадрені броненосці типу «Реджина Маргерита», завершені між 1904 та 1905 роками, належали до класу італійських пре-дредноутів, у яких особливий упор робився на швидкість. Вони були озброєні чотирма 30,5-см (12-дюймовими) та дванадцяти 15,2-см (6-дюймових) гарматами. Їхня конструкція відображала баланс між вогневою міцтю, захистом і відносно високою швидкістю для своєї епохи, але все ж відповідала стандартам пре-дредноутів."
  ITA_battleship_1:0 "Тип «Данте Аліг'єрі»"
  ITA_battleship_2:0 "Тип «Конте ді Кавур»"
  ITA_battleship_3:0 "Тип «Андреа Доріа»"

 ## Японія
  JAP_battleship_0:0 "Тип «Сацума»"
  JAP_battleship_0_desc:0 "Ескадрені броненосці типу «Сацума», завершені у 1910 році, стали першими лінійними кораблями, спроєктованими та закладеними в Японії. Спочатку планувалося оснастити їх єдиним головним калібром із дванадцяти 30,5-см (12-дюймових) гармат, що фактично робило б їх кораблями концепції «усе великі гармати» ще до завершення HMS Dreadnought, проте бюджетні обмеження призвели до того, що вони були добудовані зі змішаним озброєнням із чотирьох 30,5-см (12-дюймових) та дванадцяти 25,4-см (10-дюймових) гармат. Це зробило їх потужними пре-дредноутами з важким допоміжним калібром, але вони все одно мали тактичні обмеження, притаманні кораблям зі змішаним калібром, щойно почалася справжня ера дредноутів."
  JAP_battleship_1:0 "Тип «Каваті»"
  JAP_battleship_1_desc:0 "Перший дредноут Імператорського флоту Японії. Мав досить потужний броньовий пояс. На можливості керування вогнем «Каваті» сильно впливало розмаїття калібрів його численних гармат. Подібно до інших військових кораблів свого часу, «Каваті» мав недостатній горизонтальний броньовий захист і слабкий протиторпедний захист."
  JAP_battleship_2:0 "Тип «Фусо»"
  JAP_battleship_2_desc:0 "Один із наймогутніших лінійних кораблів свого часу. На момент побудови «Фусо» був найбільшим військовим кораблем у світі. Він мав досить потужну артилерію та помірно важку броню."
  JAP_battleship_3:0 "Тип «Нагато»"
  JAP_battleship_3_desc:0 "«Нагато» тривалий час залишався найпотужнішим військовим кораблем в Імператорському флоті Японії. Він мав гарне бронювання та ніс 410-мм гармати головного калібру. У 1930-х роках корабель пройшов модернізацію, під час якої отримав потужніший протиторпедний захист."
  JAP_battleship_4:0 "Тип «Тоса»"
  JAP_battleship_4_desc:0 "Лінійні кораблі типу «Тоса» були збільшеною версією попереднього типу «Нагато» і мали додаткову двогарматну 41-см башту."

 ## Росія
  RUS_battleship_0:0 "Тип «Бородіно»"
  RUS_battleship_0_desc:0 "Ескадрені броненосці типу «Бородіно», завершені безпосередньо перед та під час Російсько-японської війни (1904–1905), представляли одні з найсучасніших російських пре-дредноутів. Вони мали на озброєнні чотири 30,5-см (12-дюймові) та дванадцять 15,2-см (6-дюймових) гармат. Їхні трагічні результати під час Цусімської битви підкреслили чимало притаманних пре-дредноутам конструктивних недоліків, особливо у протистоянні з добре підготовленими та злагодженими військово-морськими силами, що прискорило перехід до проєктів дредноутів."
  RUS_battleship_1:0 "Тип «Севастополь»"
  RUS_battleship_1_desc:0 "Тип «Севастополь» належав до першої серії лінійних кораблів-дредноутів, побудованих у Росії. Корабель був озброєний дванадцятьма гарматами головного калібру. Серед особливостей корабля були значна площа бортового бронювання та загальне компонування, що забезпечувало повний бортовий залп під максимально широкими кутами."
  RUS_battleship_2:0 "Тип «Імператриця Марія»"
  RUS_battleship_3:0 "Тип «Імператор Микола I»"
  RUS_battleship_3_desc:0 "Останній лінійний корабель, закладений для Російського імператорського флоту. Створений на основі лінкорів типу «Імператриця Марія», він успадкував від своїх попередників високу вогневу міць. Досвід, здобутий під час будівництва перших російських дредноутів, дозволив суттєво посилити бронювання корабля, яке отримало вдосконалену схему розташування."

