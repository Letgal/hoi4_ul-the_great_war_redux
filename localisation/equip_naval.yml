  GER_battleship_0:0 "Тип «Дойчланд»"
  GER_battleship_0_desc:0 "Ескадрені броненосці типу «Дойчланд» стали останніми пре-дредноутами, побудованими для Імператорських військово-морських сил Німеччини. Ці кораблі, хоча й мали надійне бронювання, гарний протиторпедний захист і потужну допоміжну артилерію, швидко застаріли з появою дредноутів концепції «усе великі гармати». Вони були озброєні 28-см (11-дюймовими) гарматами, які, попри свою високу ефективність, не могли зрівнятися за дальністю стрільби з більшими калібрами головних башт тогочасних дредноутів."
  GER_battleship_1:0 "Тип «Нассау»"
  GER_battleship_1_desc:0 "Перша серія дредноутів Імператорських військово-морських сил Німеччини. Цей лінійний корабель вирізнявся надійним бронюванням, гарним протиторпедним захистом і потужним допоміжним калібром. Він ніс 283-мм гармати, які за багатьма параметрами не поступалися артилерійським системам більшого калібру, прийнятим на озброєння в інших флотах світу."
  GER_battleship_2:0 "Тип «Кеніг»"
  GER_battleship_2_desc:0 "Військовий корабель був розроблений на основі лінкорів типу «Кайзер». Він успадкував від своїх попередників надзвичайно потужне бронювання. Башти головного калібру були розташовані раціональніше, що дозволяло кораблю вести бортовий залп з усіх гармат."
  GER_battleship_3:0 "Тип «Баєрн»"
  GER_battleship_3_desc:0 "Військовий корабель належав до останньої серії лінійних кораблів, побудованих для Імператорських військово-морських сил Німеччини. Він вирізнявся потужними 380-мм гарматами головного калібру з надзвичайно хорошою балістикою снарядів та досить високою як для таких артилерійських систем скорострільністю."
