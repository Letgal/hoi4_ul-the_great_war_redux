 ship_hull_light_4: "Есмінець 1922 року"
 ship_hull_cruiser: "Крейсер"
 ship_hull_cruiser_desc:0 "Робоча конячка флоту, крейсери беруть на себе безліч важливих обов'язків, від розвідки і огляду для легких крейсерів до підтримки бойової лінії для важких крейсерів."
 ship_hull_cruiser_0: "Крейсер 1880 року"
 ship_hull_cruiser_1: "Крейсер 1890 року"
 ship_hull_cruiser_2: "Крейсер 1904 року"
 ship_hull_cruiser_3: "Крейсер 1910 року"
 ship_hull_cruiser_4: "Крейсер 1916 року"
 ship_hull_cruiser_5: "Крейсер 1922 року"
 ship_hull_heavy: "Важкий корабель"
 ship_hull_heavy_desc:0 "Будучи вищим символом військово-морської могутності, ці масивні, важко броньовані бегемоти, як і раніше, викликають повагу у відкритому морі, хоча деякі експерти ставлять під сумнів їхню роль в епоху літаків і підводних човнів."
 ship_hull_heavy_1: "Дредноут"
 ship_hull_heavy_2: "Супердредноут"
 ship_hull_heavy_3: "Пізній дредноут"
 ship_hull_heavy_4: "Післядредноут"
 ship_hull_carrier: "Гідроавіаносець"
 ship_hull_carrier_desc:0 "Після багатьох років експериментів над авіаносцями він перетворився на власний клас кораблів. Здатний підтримувати зростаючу кількість дедалі потужніших літаків, авіаносець готовий стати останнім словом у проекції військово-морської потужності."
 ship_hull_carrier_0: "Ранній гідроавіаносець"
 ship_hull_carrier_conversion_bb: "Переобладнаний лінкор"
 ship_hull_carrier_conversion_ca: "Переобладнаний крейсер"
 improved_ship_hull_carrier: "Поліпшений гідроавіаносець"
 ship_hull_carrier_1: "Гідроавіаносець 1916 року"
 ship_hull_carrier_2: "Гідроавіаносець 1922 року"
 #ship_hull_carrier_3: "Авіаносець 1928 року"
 ship_hull_submarine: "Підводний човен"
 ship_hull_submarine_desc:0 "Далеко відійшовши від грубих човнів часів Великої війни, сучасний підводний човен володіє більшими можливостями, ніж будь-коли раніше, і може загрожувати навіть найбільшому кораблю за вельми помірних витрат."
 ship_hull_submarine_1: "Ранній підводний човен"
 ship_hull_submarine_2: "Підводний човен 1910 року"
 ship_hull_submarine_3: "Підводний човен 1916 року"
 ship_hull_submarine_4: "Підводний човен 1922 року"
 ship_hull_ironclad: "Пізній броненосець"
 ship_hull_ironclad_desc: "TODO"
 ship_hull_pre_dreadnought: "Додредноут"
 ship_hull_pre_dreadnought_desc:0 "Ці кораблі, що є перехідним типом між броненосцями та дредноутами, мають змішане озброєння та є повільнішими за справжні дредноути. Вони представляють військово-морський стандарт на рубежі століть, але швидко застарівають." # (@!)
 ship_hull_cruiser_panzerschiff: "$panzerschiff$"
 ship_hull_cruiser_panzerschiff_desc: "$panzerschiff_desc$"
 GER_ship_hull_cruiser_panzerschiff: "$GER_panzerschiff$"
 panzerschiff: "Кишеньковий лінкор"
 panzerschiff_desc:0 "Озброєння майже на рівні лінкора з корпусом крейсера. Корабель, який перевершує за озброєнням будь-який інший відомий крейсер, але який також є дорогим, порівняно повільним і відносно слабо броньованим." # (@!)
 GER_panzerschiff: "Panzerschiff"
 ship_hull_super_heavy_1: "Великий лінкор"
 ship_hull_super_heavy_1_desc:0 "У нинішньому стані світу вже немає місця для дотримання морських договорів. Без цих обмежень ми можемо повністю зосередитися на створенні найважчих і найкраще озброєних лінкорів всіх часів, здатних протистояти декільком меншим кораблям." # (@!)
 ship_hull_cruiser_submarine: "Підводний крейсер"
 ship_hull_cruiser_submarine_desc:0 "Більший корпус підводного човна, оптимізований для більшої дальності плавання. Може бути оснащений додатковими паливними баками для ще більшої дальності плавання або невеликим розвідувальним літаком." # (@!)
 ship_hull_fleet_submarine: "Ексадрений підводний човен"
 ship_hull_fleet_submarine_desc:0 "Підводні човни, які завдяки великій дальності плавання можуть виконувати функції супроводу та підтримки надводного флоту." # (@!)
 ship_hull_coastal_submarine: "Прибережний підводний човен"
 ship_hull_coastal_submarine_desc:0 "Невеликий, маневрений підводний човен з невеликою осадкою, який добре підходить для плавання в прибережних каналах і гаванях. Обмежений простір дозволяє їм досягати районів, недоступних для більших підводних човнів, і бути більш важкими для виявлення." # (@!)

