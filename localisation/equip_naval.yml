  ENG_battleship_0:0 "Тип «Кінг Едуард VII»"
  ENG_battleship_0_desc:0 "Ескадрені броненосці типу «Кінг Едуард VII», завершені між 1905 та 1906 роками, стали останнім типом пре-дредноутів, побудованих для Королівського флоту перед появою революційного HMS Dreadnought. Ці кораблі представляли значний крок у британському кораблебудуванні, маючи змішаний головний калібр із чотирьох 30,5-см (12-дюймових) та чотирьох 23,4-см (9,2-дюймових) гармат на додачу до чималої батареї допоміжного калібру. Хоча вони й були інноваційними як для пре-дредноутів, зокрема завдяки важчому допоміжному озброєнню, введення в експлуатацію HMS Dreadnought у грудні 1906 року майже миттєво зробило їх застарілими, що фактично започаткувало нову еру у військово-морському будівництві."
  ENG_battleship_1:0 "Тип «Беллерофон»"
  ENG_battleship_1_desc:0 "Лінійні кораблі типу «Беллерофон» були створені на базі знаменитого типу «Дредноут». Корабель успадкував від свого попередника турбінну силову установку та головний калібр із десяти 305-мм гармат, але, на відміну від прототипу, мав броньований протиторпедний захист."
  ENG_battleship_2:0 "Тип «Айрон Дюк»"
  ENG_battleship_2_desc:0 "Типовий британський лінійний корабель часів Великої війни. Корабель ніс такі ж гармати головного калібру, як і лінкори попереднього типу, але був озброєний потужнішими гарматами допоміжного калібру."
  ENG_battleship_3:0 "Тип «Рівендж»"
  ENG_battleship_4:0 "Тип «Нельсон»"
  ENG_battleship_4_desc:0 "Цей лінійний корабель вирізнявся інноваційним компонуванням, спроєктованим з урахуванням обмежень Вашингтонського морського договору 1922 року. Корабель був озброєний 406-мм головними гарматами, зосередженими у трьох баштах у носовій частині. Він став першим лінкором Королівського флоту, заброньованим за концепцією «усе або нічого»."
