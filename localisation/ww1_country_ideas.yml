### СТАРИЙ ПЕРЕКЛАД ###
 army_mutiny_desc:0 "Після загибелі стількох людей деякі частини армії здіймають заколоти і відмовляються брати участь в операціях, які вони вважають самогубними. Якщо не вжити належних заходів, це може перерости в щось дуже тривожне."
 schlieffen_desc:0 "План Шліффена був розроблений як відповідь на зростаючу напруженість у світі після Першої Світової Війни. План передбачав напад на Бельгію, тим самим загрожуючи самому серцю Франції."
