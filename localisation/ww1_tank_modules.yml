 side_hulled_canons: "Бортові гармати" # (@VZ)
 side_hulled_canons_desc: "Пара гармат, розташованих із боків танка для збільшення вогневої потужності." # (@VZ)
 expanded_hull: "Подовжений корпус" # (@VZ)
 expanded_hull_desc: "Подовження машини дозволить їй долати ширші окопи та підвищить її ефективність." # (@VZ)
 defensive_assets: "Захисні засоби" # (@VZ)
 defensive_assets_desc: "Щоб підвищити живучість наших машин, нам потрібно замислитися над новими технологіями бронювання." # (@VZ)
 secondary_engine: "Допоміжний двигун" # (@VZ) — було: Другорядний двигун
 secondary_engine_desc: "Менший двигун допомагає основному, забезпечуючи вищу швидкість." # (@VZ)
 tank_steam_engine: "Паровий двигун"
 tank_steam_engine_desc: "Старомодний паровий двигун, що забезпечує мінімальну кількість кінських сил за меншої вартості виробництва." # (@VZ)

 maintenance_optimisation: "Оптимізація обслуговування" # (@VZ)
 maintenance_optimisation_desc: "Техніка коштує дорого, тому вона має бути простою в обслуговуванні." # (@VZ)

 turret_improvement: "Повноповоротна башта" # (@VZ)
 turret_improvement_desc: "Впровадження єдиної повноповоротної башти, що несе основне озброєння машини, перевершить фіксовані надбудови." # (@VZ)

 fuhrer_turret_improvement: "Поліпшені башти" # (@VZ)
 fuhrer_turret_improvement_desc: "Наші поточні моделі башт застаріли й не використовують весь потенціал сучасної війни. Верхню частину корпусу необхідно збільшити, щоб розмістити двох членів екіпажу." # (@VZ)

 multi_turret_design: "Вдосконалене покращення башти" # (@VZ)
 multi_turret_design_desc: "Ми можемо підвищити ефективність наших улюбленців, створивши великі башти, здатні вмістити боєкомплект, навідника та командира." # (@VZ)

 periscope: "Ранній перископ"
 tank_periscope: "Ранній перископ"
 periscope_desc: "Перископ, який використовує піхота в окопах, є інноваційною системою, що дозволяє бійцю спостерігати за полем бою з безпечного місця." # (@VZ)

 strobe_sight: "Стробоскопічний приціл" # (@VZ)
 strobe_sight_desc: "Стробоскопічна вежа з вузькими щілинами, яка дозволяє командиру спостерігати за полем бою майже без ризику влучання кулі." # (@VZ)
 
 tank_pigeons: "Голуби"
 tank_pigeons_desc: "Голубів можна навчити доставляти повідомлення до штабу, хоча іноді вони так і не повертаються." # (@VZ)
 
 tank_flags: "Прапорці"
 tank_flags_desc: "Командир взводу використовує різні прапорці для зв'язку зі своєю групою." # (@VZ)

 long_range_radio: "Радіостанція далекого радіуса дії" # (@VZ)
 long_range_radio_desc: "Система радіозв'язку займає місце озброєння танка, дозволяючи йому передавати інформацію до штабу в режимі реального часу." # (@VZ)

